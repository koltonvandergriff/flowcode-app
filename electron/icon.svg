<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="fGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e2f0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Letter F -->
  <text x="256" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800" font-size="340" fill="url(#fGrad)"
        text-anchor="middle" dominant-baseline="auto"
        letter-spacing="-10">F</text>
  <!-- Subtle code bracket accents -->
  <text x="100" y="430" font-family="'Courier New', monospace"
        font-weight="700" font-size="80" fill="#ffffff" opacity="0.25"
        text-anchor="middle">&lt;</text>
  <text x="412" y="430" font-family="'Courier New', monospace"
        font-weight="700" font-size="80" fill="#ffffff" opacity="0.25"
        text-anchor="middle">/&gt;</text>
</svg>
